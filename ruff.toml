# Ruff configuration for CIAF Watermarking

# Increase line length to match flake8 config
line-length = 100

[lint]
# Enable specific rule sets
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
]

# Ignore specific rules
ignore = [
    "E501",  # line too long (handled by line-length)
]

# Per-file ignores
per-file-ignores = { "__init__.py" = ["F401"], "test_*.py" = ["F841"], "conftest.py" = ["F841"], "advanced_features.py" = ["F401", "E722"], "*/verification.py" = ["F841"], "fragment_selection.py" = ["F401", "E722"], "gpu/*.py" = ["F401"], "video/__init__.py" = ["F401"] }

# Exclude directories
exclude = [
    ".git",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".venv",
    "venv",
    "build",
    "dist",
    "htmlcov_watermarks",
    "*.egg-info",
]
